<!--
  Android notification icon.
  REQUIRED: white silhouette on transparent background, no colours, no shading.
  Android applies the tint colour from `expo-notifications.color`.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <g fill="#FFFFFF">
    <!-- House silhouette -->
    <path d="M 48 14 L 14 48 L 22 48 L 22 78 L 74 78 L 74 48 L 82 48 Z"/>
    <!-- Bars (cut out to keep monochrome simple) -->
    <rect x="28" y="54" width="8"  height="18" rx="1" fill="#000000" fill-opacity="0"/>
  </g>
</svg>
